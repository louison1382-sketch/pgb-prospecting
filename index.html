<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUREAU. Prospecting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

        :root {
            --lime:  #D4F02A;
            --ink:   #000;
            --paper: #F0F0F0;
            --ch:    #404040;
            --g60:   #787878;
            --g30:   #B0B0B0;
            --g20:   #C8C8C8;
            --dark:  #1a1a1a;
        }

        html { font-size: 16px; }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'cv01' 1, 'cv02' 1, 'cv03' 1, 'cv04' 1;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* CURSOR */
        #cur {
            position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--lime);
            transform: translate(-50%,-50%);
            transition: width .35s cubic-bezier(.25,.46,.45,.94), height .35s cubic-bezier(.25,.46,.45,.94);
            will-change: left, top;
        }
        #cur.h { width: 44px; height: 44px; }
        #aura {
            position: fixed; pointer-events: none; z-index: 9998;
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle, rgba(212,240,42,.08) 0%, transparent 70%);
            transform: translate(-50%,-50%);
            will-change: left, top;
        }

        /* LAYOUT */
        .W { max-width: 1120px; margin: 0 auto; padding: 0 3rem; }
        @media (min-width: 1180px) { .W { padding: 0; } }
        @media (max-width: 768px)  { .W { padding: 0 1.5rem; } }

        /* NAV */
        nav { background: var(--ink); height: 60px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #111; }
        .nav-i { height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: inline-flex; align-items: center; text-decoration: none; gap: 9px; }
        .logo-n { font-weight: 700; font-size: 15px; color: #fff; letter-spacing: .01em; }
        .logo-b { display: inline-flex; padding: 5px 11px; background: #2A2A2E; font-weight: 700; font-size: 13px; letter-spacing: .07em; color: var(--lime); }
        .nav-links { display: flex; gap: 0; }
        .nav-link {
            font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .1em;
            text-transform: uppercase; text-decoration: none; color: #333;
            padding: 0 1.25rem; height: 60px; display: flex; align-items: center;
            border-left: 1px solid #111; transition: all .15s;
        }
        .nav-link:hover { color: #666; background: #0a0a0a; }
        .nav-link.active { color: var(--lime); background: #0a0a0a; }

        /* HERO */
        .hero-s { background: var(--ink); padding: 8rem 0 5.5rem; }
        .mono-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #2a2a2a; margin-bottom: 2rem; display: flex; align-items: center; gap: .875rem; }
        .mono-tag::before { content: ''; display: block; width: 28px; height: 1px; background: var(--lime); flex-shrink: 0; }
        .hero-s h1 { font-family: 'Inter', sans-serif; font-size: clamp(3.5rem, 7.5vw, 7.5rem); font-weight: 800; font-optical-sizing: auto; font-feature-settings: 'cv01' 1, 'cv02' 1, 'cv03' 1, 'cv04' 1; color: #fff; line-height: .92; letter-spacing: -.04em; }
        .hero-s h1 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--lime); letter-spacing: -.01em; }
        .hero-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #2a2a2a; margin-top: 3rem; }

        /* STEP BAR */
        .steps { background: var(--ink); border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .steps-inner { max-width: 1120px; margin: 0 auto; padding: 0 3rem; display: grid; grid-template-columns: 1fr 1fr 1fr; }
        @media (min-width: 1180px) { .steps-inner { padding: 0; } }
        .si { padding: 1.125rem 0; display: flex; align-items: center; gap: .75rem; border-right: 1px solid #222; }
        .si:last-child { border-right: none; }
        .si + .si { padding-left: 2rem; }
        .sn { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: .1em; color: #333; transition: color .3s; }
        .sl { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #fff; transition: color .3s; }
        .si.active .sn { color: var(--lime); }
        .si.active .sl { color: #fff; }
        .si.done .sn { color: #2a2a2a; }
        .si.done .sl { color: #2a2a2a; }

        /* FORM */
        #formSection { background: var(--paper); }
        .form-grid { display: grid; grid-template-columns: 1fr 380px; gap: 0; align-items: stretch; border-top: 1px solid var(--g20); }
        .form-left { padding: 6rem 4rem 6rem 0; border-right: 1px solid var(--g20); }
        .form-right { padding: 6rem 0 6rem 4rem; display: flex; flex-direction: column; }
        .form-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--g30); margin-bottom: 1.5rem; display: flex; align-items: center; gap: .75rem; }
        .form-eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--g20); flex-shrink: 0; }
        .form-headline { font-family: 'Inter', sans-serif; font-optical-sizing: auto; font-feature-settings: 'cv01' 1, 'cv02' 1, 'cv03' 1, 'cv04' 1; font-size: clamp(2rem, 4vw, 4rem); font-weight: 800; letter-spacing: -.04em; line-height: .92; color: var(--ink); margin-bottom: .875rem; }
        .form-headline .dot { color: var(--lime); }
        .form-desc { font-size: .825rem; font-weight: 300; color: var(--g60); margin-bottom: 2.5rem; line-height: 1.7; }
        .fl { margin-bottom: 1.75rem; }
        .fl-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--ch); font-weight: 700; margin-bottom: .75rem; }
        textarea { width: 100%; background: #fff; border: 1px solid var(--g20); border-radius: 0; padding: 1.25rem; font-family: 'Inter', sans-serif; font-size: .875rem; font-weight: 300; color: var(--ink); line-height: 1.75; resize: vertical; outline: none; transition: border-color .15s; -webkit-font-smoothing: antialiased; min-height: 200px; }
        textarea:focus { border-color: var(--ink); }
        textarea::placeholder { color: var(--g30); }
        .upload-sep { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
        .upload-sep::before, .upload-sep::after { content: ''; flex: 1; height: 1px; background: var(--g20); }
        .upload-sep span { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--g30); white-space: nowrap; }
        .upload-z { border: 1px dashed var(--g20); background: #fff; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; transition: border-color .2s; }
        .upload-z:hover, .upload-z.dg { border-color: var(--ink); }
        .upload-lft { display: flex; align-items: center; gap: .875rem; }
        .upload-ic { color: var(--g60); line-height: 1; }
        .upload-main { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--ch); font-weight: 700; }
        .upload-hint { font-size: .7rem; color: var(--g30); margin-top: 3px; }
        .upload-action { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--g60); border: 1px solid var(--g20); padding: .35rem .875rem; background: transparent; white-space: nowrap; transition: all .15s; }
        .upload-action:hover { border-color: var(--ink); color: var(--ink); }
        .file-ok { display: none; align-items: center; justify-content: space-between; padding: .875rem 1.25rem; background: #fff; border: 1px solid var(--ink); }
        .file-ok-l { display: flex; align-items: center; gap: .75rem; }
        .file-dot { width: 6px; height: 6px; background: var(--lime); flex-shrink: 0; }
        .file-name { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .04em; color: var(--ink); }
        .file-rm { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--g60); background: none; border: none; letter-spacing: .08em; text-transform: uppercase; transition: color .15s; }
        .file-rm:hover { color: var(--ink); }
        .params-title { font-family: 'Inter', sans-serif; font-optical-sizing: auto; font-feature-settings: 'cv01' 1, 'cv02' 1, 'cv03' 1, 'cv04' 1; font-size: clamp(1.5rem, 2.5vw, 2.5rem); font-weight: 800; letter-spacing: -.04em; line-height: .92; color: var(--ink); margin-bottom: 2.5rem; }
        .params-title .dot { color: var(--lime); }
        .select-wrap { position: relative; }
        select { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--g20); border-radius: 0; padding: .75rem 1.75rem .75rem 0; font-family: 'Inter', sans-serif; font-size: .875rem; font-weight: 400; color: var(--ink); appearance: none; outline: none; transition: border-color .15s; }
        select:focus { border-bottom-color: var(--ink); }
        .select-arrow { position: absolute; right: 0; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--g60); font-size: .55rem; }
        .slider-row { display: flex; align-items: center; gap: 1rem; padding-top: .625rem; border-bottom: 1px solid var(--g20); padding-bottom: .75rem; }
        input[type=range] { flex: 1; -webkit-appearance: none; height: 1px; background: var(--g20); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; background: var(--ink); border-radius: 0; }
        input[type=range]::-moz-range-thumb { width: 11px; height: 11px; background: var(--ink); border-radius: 0; border: none; }
        .sv { font-family: 'JetBrains Mono', monospace; font-size: .8rem; font-weight: 700; color: var(--ink); min-width: 22px; text-align: right; }
        .cta-wrap { margin-top: auto; padding-top: 2.5rem; }
        .btn-p { width: 100%; background: var(--ink); color: var(--lime); border: none; padding: 1.25rem; font-family: 'JetBrains Mono', monospace; font-size: .69rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: .75rem; transition: background .15s; }
        .btn-p:hover { background: #1a1a1a; }
        .btn-p:disabled { background: #111; color: #333; }

        /* LOADING */
        #loading { display: none; background: var(--ink); padding: 7rem 0; }
        .ls-wrap { display: flex; flex-direction: column; gap: 2.25rem; }
        .ls { display: flex; align-items: center; gap: 1rem; opacity: .3; transition: opacity .4s, color .4s; }
        .ls.a { opacity: 1; } .ls.d { opacity: 1; }
        .ls-dot { width: 4px; height: 4px; background: #333; flex-shrink: 0; transition: background .3s; position: relative; }
        .ls.a .ls-dot { background: var(--lime); animation: bl 1s ease-in-out infinite; }
        .ls.d .ls-dot { background: var(--lime); animation: none; }
        .ls.d .ls-dot::after {
            content: '✓'; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-55%);
            font-size: 9px; line-height: 1; color: var(--ink); font-family: 'JetBrains Mono', monospace; font-weight: 700;
        }
        .ls.d .ls-dot { width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; }
        @keyframes bl { 0%,100%{opacity:1} 50%{opacity:.1} }
        .ls-t { font-family: 'Inter', sans-serif; font-optical-sizing: auto; font-feature-settings: 'cv01' 1, 'cv02' 1; font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 700; letter-spacing: -.03em; color: #2a2a2a; transition: color .4s; }
        .ls.a .ls-t { color: #fff; } .ls.d .ls-t { color: #555; }

        .err { display: none; background: #0d0000; border-left: 2px solid #c22; padding: .875rem 3rem; font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: #f65; letter-spacing: .04em; }

        /* RESULTS */
        #results { display: none; background: var(--ink); }

        .r-head {
            padding: 3.5rem 0 2rem;
            display: flex; align-items: baseline; justify-content: space-between;
            border-bottom: 1px solid #111;
        }
        .r-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #2a2a2a; display: flex; align-items: center; gap: .75rem; }
        .r-tag::before { content: ''; display: block; width: 20px; height: 1px; background: var(--lime); }
        .r-count { font-family: 'Inter', sans-serif; font-optical-sizing: auto; font-feature-settings: 'cv01' 1, 'cv02' 1; font-size: clamp(2rem, 4vw, 4rem); font-weight: 800; letter-spacing: -.04em; color: #fff; }
        .r-count em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--lime); }

        .icp-block {
            display: grid; grid-template-columns: 1fr 1fr;
            border: 1px solid #1e1e1e; margin: 2rem 0 2px;
        }
        .icp-card, .icp-proof { padding: 2rem; background: #0a0a0a; }
        .icp-proof { border-left: 1px solid #1e1e1e; }
        .icp-col-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #252525; margin-bottom: 1.5rem; }
        .icp-persona { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
        .icp-icon { width: 40px; height: 40px; background: var(--lime); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icp-icon svg { width: 18px; height: 18px; }
        .icp-persona-title { font-size: 1.1rem; font-weight: 800; color: #fff; letter-spacing: -.02em; line-height: 1.2; margin-bottom: 3px; }
        .icp-persona-sub { font-size: .75rem; color: var(--g60); }
        .icp-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1.5rem; }
        .icp-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 9px; border: 1px solid #1e1e1e; color: #454545; }
        .icp-tag.hl { border-color: rgba(212,240,42,.3); color: var(--lime); background: rgba(212,240,42,.04); }
        .icp-divider { height: 1px; background: #1a1a1a; margin: 1.25rem 0; }
        .company-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: #252525; margin-bottom: .875rem; }
        .company-attrs { display: grid; grid-template-columns: 1fr 1fr; gap: .625rem; }
        .c-attr { display: flex; flex-direction: column; gap: 2px; }
        .c-attr-k { font-size: 9px; color: #333; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .08em; }
        .c-attr-v { font-size: .75rem; font-weight: 600; color: #ccc; }

        .proof-stat { display: flex; gap: 1rem; padding: 1.125rem 0; border-bottom: 1px solid #111; align-items: flex-start; }
        .proof-stat:first-of-type { border-top: 1px solid #111; }
        .proof-num { font-size: 1.6rem; font-weight: 800; color: var(--lime); letter-spacing: -.03em; line-height: 1; min-width: 60px; flex-shrink: 0; }
        .proof-text { font-size: .75rem; line-height: 1.55; color: #555; }
        .proof-text strong { color: #aaa; font-weight: 600; }
        .proof-src { font-size: 9px; color: #2a2a2a; font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
        .proof-reasoning { margin-top: 1.25rem; padding: 1rem; background: #111; border-left: 2px solid var(--lime); }
        .proof-reasoning-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--lime); margin-bottom: 6px; }
        .proof-reasoning-text { font-size: .75rem; line-height: 1.6; color: #555; }

        .prospects-wrap { border: 1px solid #1e1e1e; background: #0a0a0a; }
        .p2-header { padding: 1.25rem 1.75rem; border-bottom: 1px solid #111; display: flex; align-items: center; justify-content: space-between; }
        .p2-header-left { display: flex; flex-direction: column; gap: 2px; }
        .p2-count { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: #252525; }
        .p2-title { font-size: .9rem; font-weight: 800; color: #fff; letter-spacing: -.01em; }
        .p2-table { width: 100%; border-collapse: collapse; }
        .p2-table thead tr { border-bottom: 1px solid #111; }
        .p2-table th { padding: .75rem 1rem; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #252525; background: #080808; }
        .p2-table th:first-child { padding-left: 1.75rem; }
        .p2-table th:last-child { padding-right: 1.75rem; }
        .p2-table tbody tr { border-bottom: 1px solid #0d0d0d; transition: background .1s; }
        .p2-table tbody tr:last-child { border-bottom: none; }
        .p2-table tbody tr:hover { background: #050505; }
        .p2-table td { padding: 1.25rem 1rem; vertical-align: top; }
        .p2-table td:first-child { padding-left: 1.75rem; }
        .p2-table td:last-child { padding-right: 1.75rem; }
        .p2-name { font-size: .85rem; font-weight: 700; color: #fff; letter-spacing: -.01em; margin-bottom: 2px; }
        .p2-role { font-size: .75rem; color: var(--g60); margin-bottom: .5rem; }
        .p2-links { display: flex; gap: 5px; flex-wrap: wrap; }
        .p2-link { display: inline-flex; align-items: center; gap: 3px; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600; padding: 2px 7px; border: 1px solid #1e1e1e; color: #333; text-decoration: none; transition: all .15s; letter-spacing: .04em; text-transform: uppercase; }
        .p2-link:hover { border-color: #555; color: #888; }
        .p2-link.li:hover { border-color: #0A66C2; color: #0A66C2; }
        .p2-link.web:hover { border-color: var(--lime); color: var(--lime); }
        .p2-link svg { width: 8px; height: 8px; }
        .p2-email { font-family: 'JetBrains Mono', monospace; font-size: .65rem; color: #454585; background: #0d0d0d; padding: 3px 7px; border: 1px solid #1a1a1a; white-space: nowrap; display: inline-block; }
        .p2-email.none { color: #222; }
        .p2-score { display: flex; flex-direction: column; align-items: center; gap: 4px; padding-top: 4px; }
        .p2-score-num { font-size: 1.25rem; font-weight: 800; letter-spacing: -.03em; }
        .p2-score-num.hi { color: var(--lime); }
        .p2-score-num.md { color: #FFD166; }
        .p2-score-bar { width: 32px; height: 2px; background: #1a1a1a; }
        .p2-score-fill { height: 100%; }
        .p2-score-fill.hi { background: var(--lime); }
        .p2-score-fill.md { background: #FFD166; }
        .p2-args { list-style: none; display: flex; flex-direction: column; gap: 7px; }
        .p2-arg { display: flex; gap: 7px; align-items: flex-start; }
        .p2-arg-dot { width: 3px; height: 3px; background: var(--lime); flex-shrink: 0; margin-top: 6px; border-radius: 50%; }
        .p2-arg-text { font-size: .72rem; line-height: 1.5; color: #555; flex: 1; }
        .p2-arg-text strong { color: #aaa; font-weight: 600; }
        .p2-arg-src { display: inline-flex; align-items: center; gap: 2px; font-size: 9px; color: #252525; font-family: 'JetBrains Mono', monospace; text-decoration: none; border-bottom: 1px solid #1e1e1e; transition: all .15s; margin-left: 3px; }
        .p2-arg-src:hover { color: var(--lime); border-bottom-color: var(--lime); }
        .p2-arg-src svg { width: 8px; height: 8px; }
        .p2-export { padding: 1.25rem 1.75rem; border-top: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .p2-export-meta { font-family: 'JetBrains Mono', monospace; font-size: .65rem; color: #252525; }
        .p2-export-btns { display: flex; gap: .75rem; }
        .btn-s { background: transparent; color: var(--g60); border: 1px solid var(--dark); padding: .625rem 1.5rem; font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; transition: all .15s; }
        .btn-s:hover { background: #fff; color: var(--ink); border-color: #fff; }
        .btn-s.lime { border-color: rgba(212,240,42,.3); color: var(--lime); }
        .btn-s.lime:hover { background: var(--lime); color: var(--ink); border-color: var(--lime); }

        /* CAMPAIGNS + HISTORY */
        #page-campaigns, #page-history, #page-logs { display: none; background: var(--ink); min-height: calc(100vh - 60px); }

        .pg-head { border-bottom: 1px solid #111; padding: 3rem 0 2rem; }
        .pg-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #2a2a2a; display: flex; align-items: center; gap: .75rem; margin-bottom: .625rem; }
        .pg-label::before { content: ''; display: block; width: 20px; height: 1px; background: var(--lime); }
        .pg-title { font-size: clamp(1.75rem, 4vw, 3.5rem); font-weight: 800; color: #fff; letter-spacing: -.04em; margin-bottom: .375rem; font-optical-sizing: auto; font-feature-settings: 'cv01' 1, 'cv02' 1; }
