name: CI
on:
  push:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check . --select E,F,W --ignore E501 --exclude .venv,__pycache__
      - name: Test (pytest)
        run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: "dummy-key-for-ci"
          EXPLORIUM_API_KEY: "dummy-key-for-ci"
          AUTH_PASSWORD: "dummy"
          AUTH_SECRET: "dummy"
