<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGB Prospecting — Accès</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { width: 100%; max-width: 360px; padding: 2.5rem; }
    .logo {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0f0f0;
      margin-bottom: 2.5rem;
    }
    .logo span { color: #555; }
    h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.375rem; }
    p.sub { color: #666; font-size: 0.875rem; margin-bottom: 2rem; }
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 1rem;
      margin-bottom: 1.25rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus { border-color: #444; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #f0f0f0;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      display: none;
    }
    .message.success {
      background: #081208;
      border: 1px solid #1a3a1a;
      color: #60a060;
    }
    .message.error {
      background: #120808;
      border: 1px solid #3a1515;
      color: #e06060;
    }
    .message.visible { display: block; }
    .check-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: none;
    }
    .check-icon.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PGB <span>/</span> Prospecting</div>

    <div id="formView">
      <h1>Accès réservé</h1>
      <p class="sub">Entre ton adresse email pour recevoir un lien de connexion.</p>
      <form id="loginForm">
        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="prenom@example.com" autocomplete="email" autofocus>
        <button type="submit" id="submitBtn">Envoyer le lien</button>
        <div class="message error" id="errorMsg">Une erreur est survenue. Réessaie.</div>
      </form>
    </div>

    <div id="successView" style="display:none">
      <div class="check-icon visible">✉️</div>
      <h1>Vérifie ta boîte</h1>
      <p class="sub" style="margin-bottom:0">Un lien de connexion a été envoyé à <strong id="sentEmail"></strong>. Il expire dans 15 minutes.</p>
    </div>

    <div id="expiredView" style="display:none">
      <h1>Lien expiré</h1>
      <p class="sub" style="margin-bottom:1.5rem">Ce lien a expiré ou est déjà utilisé. Demande-en un nouveau.</p>
      <button onclick="showForm()">Recommencer</button>
    </div>
  </div>

  <script>
    // Afficher vue expirée si ?error=expired dans l'URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'expired') {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('expiredView').style.display = 'block';
    }

    function showForm() {
      document.getElementById('expiredView').style.display = 'none';
      document.getElementById('formView').style.display = 'block';
      document.getElementById('email').focus();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';
      err.classList.remove('visible');

      try {
        const res = await fetch('/api/magic-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
          credentials: 'include',
        });

        if (res.ok) {
          // Toujours afficher la vue succès (même si email non autorisé — sécurité)
          document.getElementById('formView').style.display = 'none';
          document.getElementById('sentEmail').textContent = email;
          document.getElementById('successView').style.display = 'block';
        } else {
          throw new Error();
        }
      } catch {
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Envoyer le lien';
      }
    });
  </script>
</body>
</html>
