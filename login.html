<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGB Prospecting — Accès</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { width: 100%; max-width: 360px; padding: 2.5rem; }
    .logo {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0f0f0;
      margin-bottom: 2.5rem;
    }
    .logo span { color: #555; }
    h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.375rem; }
    p.sub { color: #666; font-size: 0.875rem; margin-bottom: 2rem; }
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 1rem;
      margin-bottom: 1.25rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #444; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #f0f0f0;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .error {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #120808;
      border: 1px solid #3a1515;
      border-radius: 6px;
      color: #e06060;
      font-size: 0.8125rem;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PGB <span>/</span> Prospecting</div>
    <h1>Accès réservé</h1>
    <p class="sub">Outil interne. Mot de passe requis.</p>
    <form id="loginForm">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" autofocus>
      <button type="submit" id="submitBtn">Accéder</button>
      <div class="error" id="errorMsg">Mot de passe incorrect.</div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      const pwd = document.getElementById('password').value;
      if (!pwd) return;
      btn.disabled = true;
      btn.textContent = 'Vérification…';
      err.classList.remove('visible');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd }),
          credentials: 'include',
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Accéder';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        err.textContent = 'Erreur réseau. Réessaie.';
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Accéder';
      }
    });
  </script>
</body>
</html>
